name: scrap web pages

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

env: 
  SITE_URL: ${{ secrets.SITE_URL }}
  SENDER_GMAIL_ADDRESS: ${{ secrets.SENDER_GMAIL_ADDRESS }}
  RECEIVER_GMAIL_ADDRESS: ${{ secrets.RECEIVER_GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}

jobs:
  check:
    runs-on: ubuntu-latest
      
    permissions:
      contents: write

    steps:
      
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run script
        run: python main.py

      - name: commit if notice updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add notice.json

          git diff --staged --quiet || git commit -m "Update scraper state"

          git push